<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Cart</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh;
            background-image: url('images/BackGround.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .cart-card {
            width: 100%;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .table thead {
            background-color: #343a40;
            color: rgba(255, 255, 255, 0.9);
        }

        .total-box {
            font-size: 20px;
            color: black;
            font-weight: bold;
        }

        .btn-custom {
            height: 40px;
            border-radius: 25px;
        }

        .text-end {
            color: white;
        }

        /* Tablet */
        @media (max-width: 992px) {
            .total-box {
                font-size: 18px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {

            body {
                align-items: flex-start;
            }

            .d-flex.justify-content-between.mt-4 {
                flex-direction: column;
                gap: 20px;
            }

            .text-end {
                text-align: left !important;
            }

            .btn-custom {
                width: 100%;
            }

            h2 {
                font-size: 20px;
            }

            .badge {
                font-size: 14px !important;
            }
        }

        @media (max-width: 576px) {
            .cart-card {
                padding: 15px !important;
            }

            .table th,
            .table td {
                font-size: 13px;
            }

            .quantity {
                width: 70px;
            }
        }

    </style>
</head>

<body>

<div class="container py-5">

    <div class="card cart-card p-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="fw-bold mb-0">
                <i class="bi bi-cart-fill text-primary"></i> Your Shopping Cart
            </h2>
            <span class="badge bg-primary fs-6"
                  th:text="${#lists.size(cartItems)} + ' Items'"></span>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Price (₹)</th>
                    <th>Quantity</th>
                    <th>Total (₹)</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.productName}"></td>
                    <td class="price" th:text="${item.price}"></td>
                    <td>
                        <input type="number"
                               class="form-control quantity text-center"
                               min="1"
                               th:value="${item.quantity}"
                               onchange="calculateTotal()">
                    </td>
                    <td class="itemTotal"></td>
                    <td>
                        <button class="btn btn-danger btn-sm"
                                onclick="removeRow(this)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- TOTAL SECTION -->
        <div class="d-flex justify-content-between mt-4 flex-wrap">

            <a th:href="@{/home#Products}"
               class="btn btn-danger btn-custom">
                <i class="bi bi-arrow-left text-dark"></i>
                <strong>Continue Shopping</strong>
            </a>

            <div class="text-end">

                <div>
                    Subtotal: ₹ <span id="subtotal">0</span>
                </div>

                <div>
                    Shipping Charges: ₹ <span id="shipping">50</span>
                </div>

                <div>
                    GST (5%): ₹ <span id="tax">0</span>
                </div>

                <div class="total-box mt-2">
                    Grand Total: ₹ <span id="grandTotal">0</span>
                </div>

                <a th:href="@{/order-form}"
                   class="btn btn-success mt-2 btn-custom">
                    <i class="bi bi-bag-check"></i> Proceed to Order
                </a>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function calculateTotal() {

        let subtotal = 0;
        let rows = document.querySelectorAll("tbody tr");

        rows.forEach(row => {

            let price = parseFloat(row.querySelector(".price").innerText);
            let quantity = parseInt(row.querySelector(".quantity").value);

            let total = price * quantity;

            row.querySelector(".itemTotal").innerText = total.toFixed(2);

            subtotal += total;
        });

        let shipping = 50;
        let tax = subtotal * 0.05;
        let grandTotal = subtotal + shipping + tax;

        document.getElementById("subtotal").innerText = subtotal.toFixed(2);
        document.getElementById("tax").innerText = tax.toFixed(2);
        document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
    }

    function removeRow(button) {
        let row = button.closest("tr");
        row.remove();
        calculateTotal();
    }

    window.onload = calculateTotal;
</script>

</body>
</html>
