<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
body {
    background-image: url('/images/payment.jpg');
    min-height: 100vh;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
        .payment-card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
            margin-left:350px;
        }

        .payment-option {
            cursor: pointer;
            transition: 0.3s;
            border-radius: 15px;
        }

        .payment-option:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* Tablet */
        @media (max-width: 992px) {
            .payment-card {
                padding: 25px !important;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {

            .payment-card {
                width: 100% !important;
            }

            .payment-option i {
                font-size: 1.5rem !important;
            }

            .payment-option div {
                font-size: 14px;
            }

            h3 {
                font-size: 20px;
            }
        }

        @media (max-width: 576px) {

            .row.text-center.mb-4 {
                gap: 10px;
            }

            .col-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .payment-option {
                width: 100%;
            }

            .payment-option i {
                font-size: 1.3rem !important;
            }

            .payment-option div {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center py-5">

    <div class="card payment-card p-4 justify-content-center col-lg-5 col-md-7 col-sm-12 ">

        <h3 class="text-center mb-4 fw-bold">
            <i class="bi bi-shield-lock-fill text-success"></i>
            Secure Payment
        </h3>

<h5 class="text-center mb-3">
Total Amount: ₹ <span th:text="${order.amount}"></span>
</h5>

        <!-- PAYMENT OPTIONS -->
        <div class="row text-center mb-4">

            <div class="col-md-4 col-12 mb-2">
                <div class="p-3 border payment-option"
                     onclick="showCard()">
                    <i class="bi bi-credit-card-2-front fs-2 text-primary"></i>
                    <div>Card</div>
                </div>
            </div>

            <div class="col-md-4 col-12 mb-2">
                <div class="p-3 border payment-option"
                     onclick="showUPI()">
                    <i class="bi bi-phone fs-2 text-success"></i>
                    <div>UPI</div>
                </div>
            </div>

            <div class="col-md-4 col-12 mb-2">
                <form action="/pay" method="post">

                    <input type="hidden" name="paymentMethod" value="COD">

                    <button type="submit"
                            class="p-3 border bg-white w-100 payment-option">
                        <i class="bi bi-cash-stack fs-2 text-warning"></i>
                        <div>COD</div>
                    </button>
                </form>
            </div>

        </div>

        <!-- CARD PAYMENT -->
        <div id="cardPayment" style="display:none">
            <hr>
            <h5 class="mb-3 text-primary">Card Details</h5>

            <form action="/pay" method="post">

                <input type="hidden" name="paymentMethod" value="CARD">

                <input type="text" class="form-control mb-3"
                       placeholder="Card Number" required>

                <input type="text" class="form-control mb-3"
                       placeholder="Card Holder Name" required>

                <div class="row mb-3">
                    <div class="col-6">
                        <input type="text" class="form-control"
                               placeholder="MM/YY" required>
                    </div>
                    <div class="col-6">
                        <input type="password" class="form-control"
                               placeholder="CVV" required>
                    </div>
                </div>

                <button class="btn btn-primary w-100">
                    Pay Securely
                </button>
            </form>
        </div>

        <!-- UPI PAYMENT -->
        <div id="upiPayment" style="display:none">
            <hr>
            <h5 class="mb-3 text-success">UPI Payment</h5>

            <form action="/pay" method="post">

                <input type="hidden" name="paymentMethod" value="UPI">

                <input type="text" class="form-control mb-3"
                       placeholder="example@upi" required>

                <button class="btn btn-success w-100">
                    Pay via UPI
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    function showCard() {
        document.getElementById("cardPayment").style.display = "block";
        document.getElementById("upiPayment").style.display = "none";
    }

    function showUPI() {
        document.getElementById("upiPayment").style.display = "block";
        document.getElementById("cardPayment").style.display = "none";
    }
</script>

</body>
</html>
