<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | द्राक्ष बागायतदार</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* MAIN BACKGROUND */
        .bg-main {
            min-height: 100vh;
            width: 100%;
            background-image: url('images/login-img.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* GLASS CARD */
        .glass-card {
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border-radius: 15px;

            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .glass-card h2 {
            font-size: 26px;
        }

        .glass-card h4 {
            font-size: 20px;
        }

        .glass-card p {
            color: #000;
        }

        .form-control {
            border-radius: 30px;
            font-size: 14px;
            padding: 10px 15px;
        }

        .btn-main {
            border-radius: 30px;
            background: #2575fc;
            color: white;
            font-weight: bold;
            font-size: 15px;
            padding: 8px;
        }

        .btn-main:hover {
            background: #1a5fd0;
        }

        .switch-link {
            cursor: pointer;
            color: #2575fc;
            font-weight: bold;
        }

        /* Tablet View */
        @media (max-width: 768px) {
            .glass-card {
                max-width: 90%;
                padding: 20px;
            }

            .glass-card h2 {
                font-size: 22px;
            }

            .glass-card h4 {
                font-size: 18px;
            }
        }

        /* Mobile View */
        @media (max-width: 480px) {
            .glass-card {
                padding: 18px;
                border-radius: 12px;
            }

            .glass-card h2 {
                font-size: 20px;
            }

            .glass-card h4 {
                font-size: 16px;
            }

            .form-control {
                font-size: 13px;
            }

            .btn-main {
                font-size: 14px;
            }
        }

    </style>
</head>

<body>

<div class="bg-main">

    <div class="glass-card">

        <h2 class="text-center mb-1"><b>द्राक्ष बागायतदार!!!</b></h2>
        <p class="text-center mb-3"><strong>Welcome Back</strong></p>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h4 class="text-center mb-3">Login</h4>

            <p class="text-success text-center"
               th:if="${param.registered}">
                Registration successful! Please login.
            </p>

            <form th:action="@{/login}" th:object="${grapes}" method="post">
                <div class="form-group">
                    <input type="text" class="form-control"
                           th:field="*{name}" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control"
                           th:field="*{password}" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-main btn-block">
                    Login
                </button>
            </form>

            <p class="text-danger text-center mt-2" th:text="${error}"></p>

            <p class="text-center mt-3">
                New user?
                <span class="switch-link" onclick="showRegister()">Register here</span>
            </p>
            <!-- ADMIN LOGIN LINK -->
<p class="text-center mt-3">
    <span class="switch-link text-dark" onclick="goToAdmin()">Admin Login</span>
</p>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none;">
            <h4 class="text-center mb-3">Register</h4>

            <form th:action="@{/register}" th:object="${grapes}" method="post">
                <div class="form-group">
                    <input type="text" class="form-control"
                           th:field="*{name}" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" class="form-control"
                           th:field="*{email}" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <input type="text" class="form-control"
                           th:field="*{mobile}" placeholder="Mobile Number" required>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control"
                           th:field="*{password}" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-main btn-block">
                    Register
                </button>
            </form>

            <p class="text-center mt-3">
                Already have an account?
                <span class="switch-link" onclick="showLogin()">Login here</span>
            </p>
           
        </div>

    </div>
</div>

<script>
    function showRegister() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("registerForm").style.display = "block";
    }

    function showLogin() {
        document.getElementById("registerForm").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
    }
    
    function goToAdmin() {
        window.location.href = "admin/admin-login"; // redirect to admin login page
    }
</script>


</body>
</html>
