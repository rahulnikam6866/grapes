<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body {
        min-height: 100vh;
        background: url('/images/pack_house7.jpg') no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: black;
    }

    .thank-card {
        background-color: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        max-width: 600px;
        width: 100%;
        animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    /* Tablet */
    @media (max-width: 992px) {
        .thank-card {
            padding: 30px;
        }

        .display-4 {
            font-size: 32px;
        }
    }

    /* Mobile */
    @media (max-width: 768px) {

        .thank-card {
            padding: 25px;
        }

        .display-4 {
            font-size: 26px;
        }

        h4 {
            font-size: 16px;
        }

        .btn-lg {
            font-size: 16px;
            padding: 10px 20px;
        }
    }

    @media (max-width: 576px) {
        .display-4 {
            font-size: 22px;
        }

        h4 {
            font-size: 14px;
        }
    }

  </style>
</head>

<body>

<div class="thank-card">

    <h1 class="display-4 font-weight-bold text-success">
      Thank You 🙏
    </h1>

    <h4 class="mt-3">
      Your order has been placed successfully.<br>
      We will deliver soon 🍇
    </h4>

    <a href="/home" class="btn btn-primary btn-lg mt-4">
      Back to Home
    </a>

</div>

</body>
</html>
