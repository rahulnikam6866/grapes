<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order History</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .order-card {
            border-radius: 15px;
        }

        .card-header {
            font-weight: bold;
        }

        @media (max-width: 768px) {

            h2 {
                font-size: 20px;
            }

            .card-body p {
                font-size: 14px;
            }

            .table th,
            .table td {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<div class="container mt-5 mb-5">

<h2 class="text-center mb-4">Order History</h2>

<!-- No Orders -->
<div th:if="${#lists.isEmpty(orders)}">
<p class="text-center text-danger">No Orders Found</p>
</div>

<!-- Orders -->
<div th:each="order : ${orders}" class="card mb-4 shadow order-card">

<div class="card-header bg-dark text-white">
Order ID: <span th:text="${order.id}"></span>
</div>

<div class="card-body">

<p><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>

<p><strong>Address:</strong> <span th:text="${order.address}"></span></p>

<p><strong>Total Amount:</strong> ₹<span th:text="${order.amount}"></span></p>

<!-- STATUS + BUTTON ROW -->
<div class="row mt-3">

<div class="col-md-6">

<strong>Status:</strong>

<span class="badge badge-success"
th:if="${order.status != null and order.status.equalsIgnoreCase('Placed')}">
Placed
</span>

<span class="badge badge-danger"
th:if="${order.status != null and order.status.equalsIgnoreCase('Cancelled')}">
Cancelled
</span>

<span class="badge badge-primary"
th:if="${order.status != null and order.status.equalsIgnoreCase('Delivered')}">
Delivered
</span>

</div>

<!-- CANCEL BUTTON -->
<div class="col-md-6 text-right"
th:if="${order.status != null and order.status.equalsIgnoreCase('Placed')}">

<a th:href="@{/cancel-order/{id}(id=${order.id})}"
class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure you want to cancel this order?')">

Cancel Order

</a>

</div>

</div>

<h5 class="mt-4">Items:</h5>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="thead-light">
<tr>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
</tr>
</thead>

<tbody>

<tr th:each="item : ${order.orderItems}">
<td th:text="${item.productName}"></td>
<td th:text="${item.quantity}"></td>
<td>₹ <span th:text="${item.price}"></span></td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>
</html>
