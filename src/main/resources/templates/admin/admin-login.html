<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | द्राक्ष बागायतदार</title>

    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        /* Full-page background */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .bg-main {
            background-image: url('/images/login-img.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Card styling */
        .login-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: rgba(255,255,255,0.75);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
        }

        /* Logo adjustments */
        .login-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .login-card {
                padding: 1.5rem;
            }
            .login-card h2 {
                font-size: 1.5rem;
            }
            .login-card img {
                width: 60px;
                height: 60px;
            }
        }

        @media (min-width: 577px) and (max-width: 768px) {
            .login-card {
                padding: 2rem;
            }
            .login-card h2 {
                font-size: 1.75rem;
            }
        }

        @media (min-width: 769px) {
            .login-card {
                padding: 2.5rem;
            }
        }

        .btn-block {
            display: block;
            width: 100%;
        }

        a.text-light:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="bg-main d-flex justify-content-center align-items-center min-vh-100 p-3">

    <div class="login-card">

        <!-- Logo + Title -->
        <div class="d-flex align-items-center mb-3">
            <img th:src="@{/images/grapes-bunch.png}" class="mr-3 rounded-circle bg-light border border-2 border-dark">
            <h2 class="mb-0 font-weight-bold">Admin Panel</h2>
        </div>

        <p class="text-center mb-3"><strong>Login to your account</strong></p>

        <!-- Admin Login Form -->
        <form th:action="@{/admin/admin-login}" th:object="${admin}" method="post">
            <div class="form-group">
                <input type="text" class="form-control rounded-pill" th:field="*{name}" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control rounded-pill" th:field="*{password}" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block rounded-pill font-weight-bold">Login</button>
        </form>

        <!-- Error message -->
        <p class="text-danger text-center mt-2" th:text="${error}"></p>

        <!-- Back to user login -->
        <p class="text-center mt-3">
            <a href="/" class="text-decoration-none text-dark "> <b>Back to User Login<b></a>
        </p>

    </div>

</body>
</html>
