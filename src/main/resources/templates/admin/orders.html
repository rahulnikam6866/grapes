<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Orders</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .nav-link {
            color: #ffffff;
            font-weight: 500;
            margin: 5px 0;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
            text-decoration: none;
        }

        /* Main content */
        .main-content {
            margin-left: 220px; /* same as sidebar width */
            padding: 20px;
        }

        /* Table adjustments */
        .table th, .table td {
            vertical-align: middle;
        }

        .table .badge {
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>Admin Panel</h4>
        <a class="nav-link" href="/admin/dashboard">Dashboard</a>
        <a class="nav-link" href="/admin/products">Products</a>
        <a class="nav-link" href="/admin/users">Users</a>
        <a class="nav-link" href="/admin/orders">Orders</a>
         <a class="nav-link" href="/admin/payments">Payments</a>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <h2 class="mb-4">Orders</h2>

        <table class="table table-striped table-hover table-bordered align-middle">
            <thead class="table-primary">
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Mobile</th>
                    <th>Products</th>
                    <th>Amount</th>
                     <th>Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.customerName}"></td>
                    <td th:text="${order.mobile}"></td>
                    <td>
                        <ul class="list-unstyled mb-0" th:each="item : ${order.orderItems}">
                            <li th:text="${item.productName} + ' x ' + ${item.quantity}"></li>
                        </ul>
                    </td>
                    <td th:text="${order.amount}"></td>
                    <td style="max-width:200px; word-wrap:break-word;"
    th:text="${order.address}"></td>
                    <td>
                        <span th:switch="${order.status}">
                            <span th:case="'Placed'" class="badge bg-primary">Placed</span>
                            <span th:case="'Shipped'" class="badge bg-warning text-dark">Shipped</span>
                            <span th:case="'Delivered'" class="badge bg-success">Delivered</span>
                            <span th:case="*">${order.status}</span>
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{'/admin/orders/update/' + ${order.id} + '/Shipped'}" class="btn btn-sm btn-warning"
                               th:if="${order.status == 'Placed'}">Mark Shipped</a>
                            <a th:href="@{'/admin/orders/update/' + ${order.id} + '/Delivered'}" class="btn btn-sm btn-success"
                               th:if="${order.status == 'Shipped'}">Mark Delivered</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="7" class="text-center">No orders available.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
