<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add / Edit Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body, html { margin:0; padding:0; height:100vh; overflow-x:hidden; }

          /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .nav-link {
            color: #ffffff;
            font-weight: 500;
            margin: 5px 0;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
            text-decoration: none;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
        }

        /* Content */
        .content {
            margin-left: 220px;
            padding: 30px;
            transition: margin-left 0.3s ease;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .content { margin-left:0; padding:20px; }
            
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                height: 100%;
            }
            .sidebar.active {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
                font-size: 1.5rem;
                margin: 15px;
                cursor: pointer;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>

<!-- Mobile toggle -->
<div class="menu-toggle d-md-none" onclick="toggleSidebar()">&#9776; Menu</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h4>Admin Panel</h4>
    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
    <a class="nav-link" href="/admin/products">Products</a>
    <a class="nav-link" href="/admin/users">Users</a>
    <a class="nav-link" href="/admin/orders">Orders</a>
    <a class="nav-link" href="/admin/payments">Payments</a>
</div>

<!-- Main Content -->
<div class="content">
    <div class="container">
        <h2 th:text="${product.id != null} ? 'Edit Product' : 'Add Product'" class="mb-4"></h2>

        <form th:action="@{/admin/save-product}" th:object="${product}" method="post">
            <div class="mb-3">
                <label>Product Name:</label>
                <input type="text" th:field="*{name}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label>Description:</label>
                <input type="text" th:field="*{description}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label>Price:</label>
                <input type="number" th:field="*{price}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label>Stock:</label>
                <input type="number" th:field="*{stock}" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-success">Save Product</button>
            <a href="/admin/products" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }
</script>

</body>
</html>
