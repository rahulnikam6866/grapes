<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        /* Full-height sidebar */
        /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .nav-link {
            color: #ffffff;
            font-weight: 500;
            margin: 5px 0;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
            text-decoration: none;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
        }

        /* Main content with sidebar margin */
        .main-content {
            margin-left: 220px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        /* Cards styling */
        .dashboard-card {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .dashboard-card:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        /* Menu toggle button */
        .menu-toggle {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .menu-toggle:hover {
            color: #007bff;
        }

        /* Mobile / Tablet adjustments */
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                height: 100%;
            }
            .sidebar.active {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
                font-size: 1.5rem;
                margin: 15px;
                cursor: pointer;
                font-weight: bold;
            }
             .main-content {
                margin-left: 0;
            }
        }

        @media (max-width: 768px) {
            .row > .col-lg-3,
            .row > .col-md-6 {
                flex: 0 0 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h4>Admin Panel</h4>
        <a class="nav-link active" href="/admin/dashboard">Dashboard</a>
        <a class="nav-link" href="/admin/products">Products</a>
        <a class="nav-link" href="/admin/users">Users</a>
        <a class="nav-link" href="/admin/orders">Orders</a>
        <a class="nav-link" href="/admin/payments">Payments</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Mobile Menu Toggle -->
        <div class="menu-toggle d-lg-none" onclick="toggleSidebar()">
            &#9776; Menu
        </div>

        <h2>Dashboard</h2>

        <div class="row mt-3">

            <!-- Orders Card -->
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="/admin/orders" style="text-decoration:none;">
                    <div class="card bg-primary text-white dashboard-card shadow">
                        <h4>Total Orders</h4>
                        <h2 th:text="${orders}">0</h2>
                    </div>
                </a>
            </div>

            <!-- Users Card -->
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="/admin/users" style="text-decoration:none;">
                    <div class="card bg-success text-white dashboard-card shadow">
                        <h4>Total Users</h4>
                        <h2 th:text="${users}">0</h2>
                    </div>
                </a>
            </div>

            <!-- Products Card -->
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="/admin/products" style="text-decoration:none;">
                    <div class="card bg-warning text-white dashboard-card shadow">
                        <h4>Total Products</h4>
                        <h2 th:text="${products}">0</h2>
                    </div>
                </a>
            </div>

            <!-- Payments Card -->
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="/admin/payments" style="text-decoration:none;">
                    <div class="card bg-info text-white dashboard-card shadow">
                        <h4>Total Payments</h4>
                        <h2 th:text="${payments}">0</h2>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>

</body>
</html>
