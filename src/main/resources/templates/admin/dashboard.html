<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        /* Full-height sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .nav-link {
            color: #ffffff;
            font-weight: 500;
            margin: 5px 0;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
            text-decoration: none;
        }

        /* Main content with sidebar margin */
        .main-content {
            margin-left: 220px; /* same as sidebar width */
            padding: 20px;
        }

        /* Cards spacing */
        .dashboard-card {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .dashboard-card {
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.dashboard-card:hover {
    transform: scale(1.05);
    cursor: pointer;
}
    </style>
</head>

<body>

    <div class="sidebar">
        <h4>Admin Panel</h4>
        <a class="nav-link" href="/admin/dashboard">Dashboard</a>
        <a class="nav-link" href="/admin/products">Products</a>
        <a class="nav-link" href="/admin/users">Users</a>
        <a class="nav-link" href="/admin/orders">Orders</a>
         <a class="nav-link" href="/admin/payments">Payments</a>
    </div>

    <div class="main-content">
        <h2>Dashboard</h2>

        <div class="row">

    <!-- Orders Card -->
    <div class="col-md-4">
        <a href="/admin/orders" style="text-decoration:none;">
            <div class="card bg-primary text-white dashboard-card shadow">
                <h4>Total Orders</h4>
                <h2 th:text="${orders}">0</h2>
            </div>
        </a>
    </div>

    <!-- Users Card -->
    <div class="col-md-4">
        <a href="/admin/users" style="text-decoration:none;">
            <div class="card bg-success text-white dashboard-card shadow">
                <h4>Total Users</h4>
                <h2 th:text="${users}">0</h2>
            </div>
        </a>
    </div>

    <!-- Products Card -->
    <div class="col-md-4">
        <a href="/admin/products" style="text-decoration:none;">
            <div class="card bg-warning text-white dashboard-card shadow">
                <h4>Total Products</h4>
                <h2 th:text="${products}">0</h2>
            </div>
        </a>
    </div>
</div>
</div>



</body>
</html>
