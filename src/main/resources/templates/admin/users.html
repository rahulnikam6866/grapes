<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users | Admin Panel</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .nav-link {
            color: #ffffff;
            font-weight: 500;
            margin: 5px 0;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
            text-decoration: none;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
        }

        /* Main Content */
        .content {
            margin-left: 220px;
            padding: 30px;
            transition: margin-left 0.3s ease;
        }

        .table thead { background-color: #0d6efd; color: white; }
        .table-striped>tbody>tr:nth-of-type(odd) { background-color: #f8f9fa; }
        .table td, .table th { vertical-align: middle; }

        /* Mobile / Tablet */
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                height: 100%;
            }
            .sidebar.active {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
                font-size: 1.5rem;
                margin: 15px;
                cursor: pointer;
                font-weight: bold;
            }

            .content {
                margin-left: 0;
                padding: 20px;
            }
        }

        /* Mobile Table Adjustments */
        @media (max-width: 576px) {
            .table-responsive {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<!-- Mobile menu toggle -->
<div class="menu-toggle d-lg-none" onclick="toggleSidebar()">&#9776; Menu</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h4>Admin Panel</h4>
    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
    <a class="nav-link" href="/admin/products">Products</a>
    <a class="nav-link active" href="/admin/users">Users</a>
    <a class="nav-link" href="/admin/orders">Orders</a>
    <a class="nav-link" href="/admin/payments">Payments</a>
</div>

<!-- Main Content -->
<div class="content">
    <h2 class="mb-4">Users</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.mobile}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="4" class="text-center">No users available.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }
</script>
</body>
</html>
