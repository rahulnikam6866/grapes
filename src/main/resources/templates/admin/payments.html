<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Payments</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
margin:0;
padding:0;
}

/* Sidebar */
.sidebar {
height:100vh;
position:fixed;
top:0;
left:0;
width:220px;
background-color:#343a40;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar .nav-link{
color:#ffffff;
font-weight:500;
margin:5px 0;
padding:10px 20px;
border-radius:5px;
display:block;
}

.sidebar .nav-link:hover{
background-color:#495057;
text-decoration:none;
}

/* Main content area */
.main-content{
margin-left:220px;
padding:30px;
}

/* Responsive fix for mobile */
@media (max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
}

.main-content{
margin-left:0;
padding:15px;
}

}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h4>Admin Panel</h4>

<a class="nav-link" href="/admin/dashboard">Dashboard</a>
<a class="nav-link" href="/admin/products">Products</a>
<a class="nav-link" href="/admin/users">Users</a>
<a class="nav-link" href="/admin/orders">Orders</a>
<a class="nav-link" href="/admin/payments">Payments</a>

</div>


<!-- Main Content -->
<div class="main-content">

<h2 class="mb-4">Payment Records</h2>

<div class="card shadow">
<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Amount</th>
<th>Payment Method</th>
<th>Payment Status</th>
</tr>
</thead>

<tbody>

<tr th:each="payment : ${payments}">

<td th:text="${payment.id}"></td>

<td th:text="${payment.customerName}"></td>

<td>₹ <span th:text="${payment.amount}"></span></td>

<td>
<span class="badge bg-info"
th:text="${payment.paymentMethod}">
</span>
</td>

<td>
<span class="badge bg-success"
th:text="${payment.paymentStatus}">
</span>
</td>

</tr>

</tbody>

</table>

</div>

</div>
</div>

</div>

</body>
</html>
