<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .nav-link {
            color: #ffffff;
            font-weight: 500;
            margin: 5px 0;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
            text-decoration: none;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
        }

        /* Sidebar hidden on mobile */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                height: 100%;
            }
            .sidebar.active {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
                font-size: 1.5rem;
                margin: 15px;
                cursor: pointer;
                font-weight: bold;
            }
        }

        /* Main content */
        .main-content {
            margin-left: 220px;
            padding: 30px;
            transition: margin-left 0.3s ease;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }

        /* Table */
        .table th, .table td {
            vertical-align: middle;
        }

        .table .badge {
            font-size: 0.9em;
        }
    </style>
</head>

<body>

<!-- Mobile menu toggle -->
<div class="menu-toggle d-md-none" onclick="toggleSidebar()">&#9776; Menu</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h4>Admin Panel</h4>
    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
    <a class="nav-link" href="/admin/products">Products</a>
    <a class="nav-link" href="/admin/users">Users</a>
    <a class="nav-link" href="/admin/orders">Orders</a>
    <a class="nav-link active" href="/admin/payments">Payments</a>
</div>

<!-- Main Content -->
<div class="main-content">
    <h2 class="mb-4">Payment Records</h2>

    <div class="card shadow-sm">
        <div class="card-body p-2">
            <div class="table-responsive">
                <table class="table table-bordered table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Amount</th>
                            <th>Payment Method</th>
                            <th>Payment Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="payment : ${payments}">
                            <td th:text="${payment.id}"></td>
                            <td th:text="${payment.customerName}"></td>
                            <td>₹ <span th:text="${payment.amount}"></span></td>
                            <td>
                                <span class="badge bg-info" th:text="${payment.paymentMethod}"></span>
                            </td>
                            <td>
    <span th:switch="${payment.paymentStatus}">
        <span th:case="'Paid'" class="badge bg-success">Paid</span>
        <span th:case="'Unpaid'" class="badge bg-danger">Unpaid</span>
        <span th:case="*" class="badge bg-secondary" th:text="${payment.paymentStatus}"></span>
    </span>
</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(payments)}">
                            <td colspan="5" class="text-center">No payments available.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }
</script>

</body>
</html>
