<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login & Register | द्राक्ष बागायतदार</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
        }

        /* MAIN BACKGROUND (CLEAR) */
        .bg-main {
            min-height: 100vh;
            background-image: url('images/login-img.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GLASS / BLUR CARD */
        .glass-card {
            width: 380px;
            padding: 25px;
            border-radius: 15px;

            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .glass-card h3,
        .glass-card h4,
        .glass-card p {
            color: #000;
        }

        .form-control {
            border-radius: 30px;
        }

        .btn-main {
            border-radius: 30px;
            background: #2575fc;
            color: white;
            font-weight: bold;
        }

        .btn-main:hover {
            background: #1a5fd0;
        }

        .switch-link {
            cursor: pointer;
            color: #2575fc;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="bg-main">

    <div class="glass-card">

        <h2 class="text-center mb-1"><b>द्राक्ष बागायतदार!!!</b></h2>
        <p class="text-center mb-3"><strong>Welcome Back</strong></p>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h4 class="text-center mb-3">Login</h4>

            <p class="text-success text-center"
               th:if="${param.registered}">
                Registration successful! Please login.
            </p>

            <form th:action="@{/login}" th:object="${grapes}" method="post">
                <div class="form-group">
                    <input type="text" class="form-control"
                           th:field="*{name}" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control"
                           th:field="*{password}" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-main btn-block">
                    Login
                </button>
            </form>

            <p class="text-danger text-center mt-2" th:text="${error}"></p>

            <p class="text-center mt-3 text-white">
                New user?
                <span class="switch-link text-dark" onclick="showRegister()">Register here </span>
            </p>
        </div>
        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none;">
            <h4 class="text-center mb-3">Register</h4>

            <form th:action="@{/register}" th:object="${grapes}" method="post">
                <div class="form-group">
                    <input type="text" class="form-control"
                           th:field="*{name}" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" class="form-control"
                           th:field="*{email}" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <input type="text" class="form-control"
                           th:field="*{mobile}" placeholder="Mobile Number" required>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control"
                           th:field="*{password}" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-main btn-block">
                    Register
                </button>
            </form>

            <p class="text-center mt-3">
                Already have an account?
                <span class="switch-link" onclick="showLogin()">Login here</span>
            </p>
        </div>

    </div>
</div>

<script>
    function showRegister() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("registerForm").style.display = "block";
    }

    function showLogin() {
        document.getElementById("registerForm").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
    }
</script>

</body>
</html>
